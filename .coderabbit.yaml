# CodeRabbit Configuration
language: "pt-BR"
tone_instructions: "Seja rigoroso, focado em boas práticas de Go e Kotlin, legibilidade e segurança."

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "draft"
    drafts: false
    base_branches:
      - "main"
      - "develop"

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
