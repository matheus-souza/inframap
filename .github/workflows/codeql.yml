name: CodeQL Security Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'java-kotlin' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for source code
        id: check_code
        run: |
          if [ "${{ matrix.language }}" = "go" ]; then
            if [ -d "backend" ] && find backend -name "*.go" | grep -q .; then
              echo "has_code=true" >> $GITHUB_OUTPUT
            else
              echo "has_code=false" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ matrix.language }}" = "java-kotlin" ]; then
            if [ -d "frontend" ] && find frontend -name "*.kt" | grep -q .; then
              echo "has_code=true" >> $GITHUB_OUTPUT
            else
              echo "has_code=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Initialize CodeQL
        if: steps.check_code.outputs.has_code == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        if: steps.check_code.outputs.has_code == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
