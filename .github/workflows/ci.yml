name: CI Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    name: Verify Quality Gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: inframap
          POSTGRES_USER: inframap
          POSTGRES_PASSWORD: inframap_dev_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Check if backend exists
        id: check_backend
        run: |
          if [ -d "backend" ] && [ -f "backend/go.mod" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download Go dependencies
        if: steps.check_backend.outputs.exists == 'true'
        run: cd backend && go mod download

      - name: Run Database Migrations
        if: steps.check_backend.outputs.exists == 'true'
        env:
          DATABASE_URL: postgres://inframap:inframap_dev_pass@localhost:5432/inframap?sslmode=disable
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          cd backend && goose -dir migrations postgres "$DATABASE_URL" up

      - name: Run Backend & E2E Tests
        if: steps.check_backend.outputs.exists == 'true'
        env:
          DATABASE_URL: postgres://inframap:inframap_dev_pass@localhost:5432/inframap?sslmode=disable
        run: cd backend && go test -v -race ./...

      - name: Run golangci-lint
        if: steps.check_backend.outputs.exists == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          install-mode: goinstall
          working-directory: ./backend
          skip-cache: true

      - name: Run Go vulnerability check (govulncheck)
        if: steps.check_backend.outputs.exists == 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd backend && govulncheck ./...

      - name: Build Production Backend Binary
        if: steps.check_backend.outputs.exists == 'true'
        run: cd backend && CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/api ./cmd/api
