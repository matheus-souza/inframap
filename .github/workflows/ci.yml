name: CI Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    name: Verify Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.22'
          check-latest: true

      - name: Check if backend exists
        id: check_backend
        run: |
          if [ -d "backend" ] && [ -f "backend/go.mod" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run golangci-lint
        if: steps.check_backend.outputs.exists == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.56.2
          working-directory: ./backend

      - name: Run Go vulnerability check (govulncheck)
        if: steps.check_backend.outputs.exists == 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd backend && govulncheck ./...

      - name: Run Backend Tests
        if: steps.check_backend.outputs.exists == 'true'
        run: |
          cd backend && go test -v -race -coverprofile=coverage.out ./...

      - name: Build Production Backend Binary
        if: steps.check_backend.outputs.exists == 'true'
        run: |
          cd backend && CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/api ./cmd/api
