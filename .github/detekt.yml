build:
  maxIssues: 0
  excludeCorrectable: false
  weights:

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

complexity:
  active: true
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    ignoreDeprecated: false
  LongMethod:
    active: true
    threshold: 40

style:
  active: true
  UnusedPrivateMember:
    active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: true

naming:
  active: true
  PackageNaming:
    active: true
    packagePattern: '^[a-z]+(\.[a-z][a-z0-9]*)*$'
